<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8"/>
    <link rel="stylesheet" href="style.css"/>
    <title>Form by HTML and CSS</title>
  </head>
  <body>
    <h1 id="title">freeCodeCamp Survey Form</h1>
    <p id="description">Thank you for taking the time to help us improve the platform</p>

    <form id="survey-form">

<fieldset>
      <label for="name">Name <input type="text" id="name" name="name" placeholder="Enter your name" required/></label>
      <label for="email">Email <input type="email" id="email" name="email" placeholder="Enter your Email" required/></label>
      <label for="age">Age (optional) <input type="number" id="age" min="13" max="120" name="age" placeholder="Age" /></label>
</fieldset>

<fieldset>
  <label for="dropdown">Which option best describes your current role?</label>
      <select id="dropdown" name="role">
        <option value="">Select current role</option>
        <option value="student">Student</option>
        <option value="full-time-job">Full time job</option>
        <option value="full-time-teacher">Full time teacher</option>
        <option value="prefer-not-to-say">Prefer not to say</option>
        <option value="other">Other</option>
        </select>
</fieldset>

<fieldset>
        <legend>Would you recommend freeCodeCamp to a friend?</legend>
        <label><input type="radio" name="recommendation" value="definitely" class="inline" /> Definitely</label>
        <label><input type="radio" name="recommendation" value="maybe" class="inline" /> Maybe</label>
        <label><input type="radio" name="recommendation" value="not-sure" class="inline" /> Not sure</label>
</fieldset>

<fieldset>
        <label>What would you like to see improved? (Check all that apply)</label>
        <label for="front-end-projects"> <input type="checkbox" value="front-end-projects" id="front-end-projects" name="improvements" class="inline1" />Front-end Projects</label>
        <label for="back-end-projects"> <input type="checkbox" value="back-end-projects" id="back-end-projects" name="improvements" class="inline1" />Back-end Projects</label>
        <label for="data-visualization"> <input type="checkbox" value="data-visualization" id="data-visualization" name="improvements" class="inline1" />Data Visualization</label>
        <label for="challenges"> <input type="checkbox" value="challenges" id="challenges" name="improvements" class="inline1" />Challenges</label>
        <label for="documentation"> <input type="checkbox" value="documentation" id="documentation" name="improvements" class="inline1" />Documentation</label>
        <label for="community-support"> <input type="checkbox" value="community-support" id="community-support" name="improvements" class="inline1" />Community Support</label>
        <label for="mobile-development"> <input type="checkbox" value="mobile-development" id="mobile-development" name="improvements" class="inline1" />Mobile Development</label>
        <label for="ui-ux-design"> <input type="checkbox" value="ui-ux-design" id="ui-ux-design" name="improvements" class="inline1" />UI/UX Design</label>
        <label for="testing"> <input type="checkbox" value="testing" id="testing" name="improvements" class="inline1" />Testing</label>
        <label for="deployment"> <input type="checkbox" value="deployment" id="deployment" name="improvements" class="inline1" />Deployment</label>
        <label for="performance-optimization"> <input type="checkbox" value="performance-optimization" id="performance-optimization" name="improvements" class="inline1" />Performance Optimization</label>
        <label for="accessibility"> <input type="checkbox" value="accessibility" id="accessibility" name="improvements" class="inline1" />Accessibility</label>
        <label for="security"> <input type="checkbox" value="security" id="security" name="improvements" class="inline1" />Security</label>
        <label for="version-control"> <input type="checkbox" value="version-control" id="version-control" name="improvements" class="inline1" />Version Control</label>

        <label for="comment">Any comments or suggestions? <textarea id="comment" name="comment" rows="7" cols="80" placeholder="Enter your comment here"></textarea></label>
</fieldset>

        <input type="submit" id="submit" value="Submit"/>

      </form>
    </body>
  </html>
